<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Project Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body class="container mt-4">
  <h1>Project Dashboard</h1>

  <!-- เมนูดาวน์โหลดไฟล์ -->
  <h2>ดาวน์โหลดไฟล์ต้นแบบและตัวอย่าง</h2>
  <ul>
    <li><a href="template.csv" download>📄 Template CSV</a></li>
    <li><a href="demo-2569.csv" download>📄 Demo ปี 2569</a></li>
    <li><a href="demo-2570.csv" download>📄 Demo ปี 2570</a></li>
    <li><a href="README.md" download>📘 README คู่มือการใช้งาน</a></li>
  </ul>

  <h2>ดาวน์โหลดไฟล์รวมชุด</h2>
  <p><a href="project-dashboard.zip" download>⬇️ ดาวน์โหลดไฟล์รวมชุด (ZIP)</a></p>

  <!-- ส่วนเลือกไฟล์ CSV -->
  <input type="file" id="fileInput" class="form-control mb-3">
  <select id="projectFilter" class="form-select mb-3">
    <option value="all">ทั้งหมด</option>
  </select>
  <div id="summary" class="mb-3"></div>
  <button id="exportBtn" class="btn btn-success mb-3">บันทึกไฟล์ CSV</button>

  <!-- Dashboard -->
  <div id="gantt"></div>

<script>
let allTasks = [];

document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
  const reader = new FileReader();
  reader.onload = function(event) {
    const text = event.target.result;
    parseCSV(text);
  };
  reader.readAsText(e.target.files[0]);
}

function parseCSV(text) {
  const rows = text.trim().split("\n");
  allTasks = rows.slice(1).map(row => {
    const cols = row.split(",");
    return {
      project: cols[0],
      activity: cols[1],
      status: cols[2] === "TRUE" ? 100 : 0,
      start: new Date(cols[3]),
      end: new Date(cols[4]),
      cost: parseInt(cols[5])
    };
  });
  updateFilter();
  drawGantt(allTasks);
  updateSummary();
}

function updateFilter() {
  const projects = [...new Set(allTasks.map(t => t.project))];
  const filter = document.getElementById('projectFilter');
  filter.innerHTML = '<option value="all">ทั้งหมด</option>';
  projects.forEach(p => {
    filter.innerHTML += `<option value="${p}">${p}</option>`;
  });
  filter.onchange = () => {
    const val = filter.value;
    drawGantt(val === "all" ? allTasks : allTasks.filter(t => t.project === val));
  };
}

function drawGantt(tasks) {
  document.getElementById('gantt').innerHTML = "";
  const svg = d3.select("#gantt").append("svg").attr("width",800).attr("height",400);
  const x = d3.scaleTime().domain([d3.min(tasks,d=>d.start), d3.max(tasks,d=>d.end)]).range([0,700]);
  const y = d3.scaleBand().domain(tasks.map(d=>d.activity)).range([0,400]).padding(0.1);

  svg.selectAll("rect").data(tasks).enter().append("rect")
    .attr("x",d=>x(d.start)).attr("y",d=>y(d.activity))
    .attr("width",d=>x(d.end)-x(d.start)).attr("height",y.bandwidth())
    .attr("fill",d=>d.status===100?"green":"orange")
    .on("click",(event,d)=>{
      d.status = d.status===100?0:100;
      sendTelegramNotification(d);
      drawGantt(tasks);
      updateSummary();
    });

  svg.selectAll("text").data(tasks).enter().append("text")
    .attr("x",d=>x(d.start)).attr("y",d=>y(d.activity)-2)
    .text(d=>d.project);
}

function updateSummary() {
  const total = allTasks.reduce((sum,t)=>sum+t.cost,0);
  const byProject = {};
  allTasks.forEach(t=>{
    byProject[t.project]=(byProject[t.project]||0)+t.cost;
  });
  let html = `<p>ค่าใช้จ่ายรวม: ${total.toLocaleString()} บาท</p>`;
  for (const [p,c] of Object.entries(byProject)) {
    html += `<p>${p}: ${c.toLocaleString()} บาท</p>`;
  }
  document.getElementById('summary').innerHTML = html;
}

function sendTelegramNotification(task) {
  const token = "YOUR_BOT_TOKEN";
  const chatId = "YOUR_CHAT_ID";
  const message = `📢 งานถูกอัปเดต: ${task.project} - ${task.activity}\nสถานะ: ${task.status===100?"เสร็จแล้ว ✅":"ยังไม่เสร็จ ⏳"}\nค่าใช้จ่าย: ${task.cost.toLocaleString()} บาท`;
  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:chatId,text:message})
  });
}

document.getElementById('exportBtn').addEventListener('click', exportCSV);

function exportCSV() {
  let csvContent = "data:text/csv;charset=utf-8,";
  csvContent += "Project,Activity,Status,Start,End,Cost\n";
  allTasks.forEach(t=>{
    const statusText = t.status===100?"TRUE":"FALSE";
    const start = `${t.start.getFullYear()}-${String(t.start.getMonth()+1).padStart(2,'0')}-${String(t.start.getDate()).padStart(2,'0')}`;
    const end = `${t.end.getFullYear()}-${String(t.end.getMonth()+1).padStart(2,'0')}-${String(t.end.getDate()).padStart(2,'0')}`;
    csvContent += `${t.project},${t.activity},${statusText},${start},${end},${t.cost}\n`;
  });
  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href",encodedUri);
  link.setAttribute("download","updated_tasks.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
</body>
</html>
